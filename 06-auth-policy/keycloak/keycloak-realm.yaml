apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: connectivity-link-tutorial
  namespace: tutorial-keycloak
  labels:
    app.kubernetes.io/part-of: connectivity-link-tutorial
spec:
  keycloakCRName: tutorial-keycloak
  realm:
    realm: connectivity-link-tutorial
    id: connectivity-link-tutorial
    enabled: true
    sslRequired: external
    registrationAllowed: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    roles:
      realm:
        - name: user
          description: Default user role
        - name: admin
          description: Administrator role
    clients:
      - clientId: tutorial-app
        enabled: true
        protocol: openid-connect
        publicClient: false
        clientAuthenticatorType: client-secret
        secret: tutorial-app-secret
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        serviceAccountsEnabled: false
        frontchannelLogout: false
        redirectUris:
          - "*"
        webOrigins:
          - "*"
        defaultClientScopes:
          - openid
          - email
          - profile
          - roles
    users:
      - username: testuser
        enabled: true
        emailVerified: true
        email: testuser@example.com
        firstName: Test
        lastName: User
        realmRoles:
          - user
        credentials:
          - type: password
            value: testuser
            temporary: false
